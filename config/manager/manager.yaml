apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: clustregcred-operator
    app.kubernetes.io/managed-by: kustomize
  name: clustregcred-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustregcred-operator-controller-manager
  namespace: clustregcred-operator-system
  labels:
    app.kubernetes.io/name: clustregcred-operator
    app.kubernetes.io/component: manager
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clustregcred-operator
      app.kubernetes.io/component: manager
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clustregcred-operator
        app.kubernetes.io/component: manager
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: clustregcred-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: clustregcred-operator-controller-manager
      terminationGracePeriodSeconds: 10